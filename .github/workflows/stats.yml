name: Update stats

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_stats.py

      - name: Validate generated file
        run: |
          if [ ! -s assets/stats.svg ]; then
            echo "ERROR: assets/stats.svg was not generated or is empty."
            exit 1
          fi
          if ! grep -q '<svg' assets/stats.svg; then
            echo "ERROR: assets/stats.svg does not appear to be a valid SVG."
            cat assets/stats.svg
            exit 1
          fi
          SIZE=$(wc -c < assets/stats.svg)
          echo "assets/stats.svg validated: ${SIZE} bytes"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git pull --rebase --autostash origin main; then
            echo "ERROR: git pull --rebase failed. A concurrent push may have caused a conflict."
            git rebase --abort 2>/dev/null || true
            exit 1
          fi
          git add assets/stats.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: update stats"
            if ! git push origin HEAD:main; then
              echo "ERROR: git push failed. Verify GITHUB_TOKEN has 'contents: write' permission."
              exit 1
            fi
            echo "Stats committed and pushed successfully."
          else
            echo "No changes to commit — stats unchanged since last run."
          fi
